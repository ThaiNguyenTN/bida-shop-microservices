name: billiard-node-shop

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - user_db_data:/var/lib/postgresql/data

  product-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: product
      POSTGRES_PASSWORD: password
    volumes:
      - product_db_data:/var/lib/postgresql/data

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: password
    volumes:
      - order_db_data:/var/lib/postgresql/data

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: password
    volumes:
      - inventory_db_data:/var/lib/postgresql/data

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: password
    volumes:
      - notification_db_data:/var/lib/postgresql/data

  user-service:
    build: ./services/user-service
    environment:
      PORT: 3001
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: userdb
      DB_USER: user
      DB_PASSWORD: password
      JWT_SECRET: billiard_secret
    depends_on:
      - user-db

  product-service:
    build: ./services/product-service
    environment:
      PORT: 3002
      DB_HOST: product-db
      DB_PORT: 5432
      DB_NAME: productdb
      DB_USER: product
      DB_PASSWORD: password
    depends_on:
      - product-db

  order-service:
    build: ./services/order-service
    environment:
      PORT: 3003
      DB_HOST: order-db
      DB_PORT: 5432
      DB_NAME: orderdb
      DB_USER: order_user
      DB_PASSWORD: password
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PRODUCT_SERVICE_URL: http://product-service:3002
    depends_on:
      - order-db
      - rabbitmq
      - product-service

  inventory-service:
    build: ./services/inventory-service
    environment:
      PORT: 3004
      DB_HOST: inventory-db
      DB_PORT: 5432
      DB_NAME: inventorydb
      DB_USER: inventory
      DB_PASSWORD: password
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - inventory-db
      - rabbitmq

  notification-service:
    build: ./services/notification-service
    environment:
      PORT: 3005
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_NAME: notificationdb
      DB_USER: notification
      DB_PASSWORD: password
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - notification-db
      - rabbitmq

  api-gateway:
    build: ./api-gateway
    environment:
      PORT: 8080
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      INVENTORY_SERVICE_URL: http://inventory-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      SQLSERVER_HOST: host.docker.internal
      SQLSERVER_PORT: 1433
      SQLSERVER_DATABASE: BidaShopDB
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: 1234
      SQLSERVER_ENCRYPT: "false"
      SQLSERVER_TRUST_SERVER_CERT: "true"
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service
      - notification-service
    ports:
      - "8081:8080"

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "5174:80"
    depends_on:
      - api-gateway

volumes:
  user_db_data:
  product_db_data:
  order_db_data:
  inventory_db_data:
  notification_db_data:
